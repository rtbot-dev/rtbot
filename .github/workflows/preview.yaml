name: CI

permissions:
  contents: read

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
    types:
      - opened
      - edited
      - synchronize
      - review_requested
      - ready_for_review

jobs:
  build-and-test:
    if: github.event.pull_request.draft == false
    name: Build and test (${{ matrix.os }})
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
        with:
          version: 8
          run_install: |
            - args: [--no-frozen-lockfile]
      - uses: actions/setup-node@v4
        with:
          node-version: 18.x
          cache: pnpm
      - name: Setup Bazel toolchain
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}
          repository-cache: true
      - name: Build all targets
        run: bazel build //...
      - name: FusedExpression parity gate
        run: >
          bazel test //libs/fuse/test:test
          --test_arg="[per_opcode],[fuzz],[golden]"
          --test_arg="--reporter=console"
          --test_output=errors
      - name: Run test suite
        run: bazel test //...
